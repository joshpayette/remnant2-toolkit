services:
  mysql:
    container_name: r2tk-mysql-local
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: r2tk_root_password
      MYSQL_USER: r2tk
      MYSQL_PASSWORD: r2tk_dev_password
      MYSQL_DATABASE: r2tk_db
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "r2tk", "-pr2tk_dev_password"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local
